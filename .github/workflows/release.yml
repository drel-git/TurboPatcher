name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "num=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish TurboPatcher.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.num }}
          -o publish

      # Attach the bare exe: it is fully self-contained, so the release
      # download is a single file players can run directly. The stable link
      # releases/latest/download/TurboPatcher.exe always serves the newest one.
      - name: Stage release asset
        run: Copy-Item publish\TurboPatcher.exe TurboPatcher.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TurboPatcher.exe
          name: Turbo Patcher ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
