name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "num=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish TurboPatcher.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.num }}
          -o publish

      - name: Zip release
        run: |
          Get-ChildItem publish -Exclude *.pdb | Compress-Archive -DestinationPath TurboPatcher.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TurboPatcher.zip
          name: Turbo Patcher ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
