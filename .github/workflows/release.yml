name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set version
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "num=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish Windows GUI
        run: >
          dotnet publish TurboPatcher.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.num }}
          -o publish-win

      - name: Publish Linux CLI
        run: >
          dotnet publish TurboPatcher.Cli/TurboPatcher.Cli.csproj
          -c Release
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.num }}
          -o publish-linux

      - name: Stage release assets
        run: |
          Copy-Item publish-win\TurboPatcher.exe TurboPatcher.exe
          Copy-Item publish-linux\TurboPatcher TurboPatcher-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TurboPatcher.exe
            TurboPatcher-linux-x64
          name: Turbo Patcher ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
